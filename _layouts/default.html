<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #02651f;
}

li {
  float: left;
}
li a, .dropbtn {
   display: inline-block;
   color: white;
   text-align: center;
   padding: 14px 16px;
   text-decoration: none;
}
li a:hover, .dropdown:hover .dropbtn{
   background-color: #012b0d;
}
li.dropdown {
   display: inline-block;
}
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}
.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown-content a:hover {background-color: #f1f1f1;}

.dropdown:hover .dropdown-content {
  display: block;
}
a {
	text-decoration: none;
	}
.active {
  background-color: #000000;
	}
</style>
	
<base href="https://traben.github.io/" target="_blank">
</head>
<body>

<ul>
  <li><a href="index">Home</a></li>
  <li class = "dropdown">
	<a href="research/research" class="dropbtn">Research</a>
	<div class="dropdown-content">
		<a href="research/genetics">Genetics</a>
		<a href="research/physics">Physics</a>
	</div>
  </li>
  <li class = "dropdown">
	<a href="outreach/outreach" class="dropbtn">Outreach</a>
	<div class="dropdown-content">
		<a href="outreach/ethics">Ethics</a>
		<a href="outreach/diversity">Diversity</a>
	 	<a href="outreach/teaching">Teaching</a> 
	</div>
  </li>
  <li class = "dropdown">
	<a href="about/about" class="dropbtn">About</a>
	<div class="dropdown-content">
		<a href="about/cv"> CV</a>
		<a href="about/background">Background</a>
	  </div>
  </li>
</ul>
  
  
  		<div class="container">
			{{ content }}
			</div><!-- /.container -->

</body>
</html>
